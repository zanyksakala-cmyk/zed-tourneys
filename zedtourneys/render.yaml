services:
  - type: web
    name: zed-tourneys
    runtime: python
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn zedtourneys.wsgi:application"

    envVars:
      - key: SECRET_KEY
        generateValue: true

      - key: DEBUG
        value: "False"

      - key: PYTHON_VERSION
        value: "3.11.0"